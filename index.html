<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouLeader | Sistema de Clima Laboral</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">💙</div>
        <h1>You<span class="logo-accent">Leader</span></h1>
        <p>Sistema de Clima Laboral y Liderazgo Emocional</p>
      </div>
      
      <div class="role-selector">
        <h3>Selecciona tu perfil</h3>
        <div class="role-buttons">
          <button class="role-btn" data-role="trabajador">
            <i class="fas fa-user-friends"></i>
            <span>👥 Colaborador</span>
            <small>Registrar mi estado de ánimo</small>
          </button>
          <button class="role-btn" data-role="supervisor">
            <i class="fas fa-chalkboard-user"></i>
            <span>👔 Supervisor</span>
            <small>Ver dashboard de mi equipo</small>
          </button>
          <button class="role-btn" data-role="rrhh">
            <i class="fas fa-chart-line"></i>
            <span>📊 Recursos Humanos</span>
            <small>Dashboard global y reportes</small>
          </button>
        </div>
      </div>
      
      <div id="loginForm" class="login-form" style="display: none;">
        <h3 id="formTitle">Ingresa tus datos</h3>
        <div class="form-group">
          <i class="fas fa-user"></i>
          <input type="text" id="userName" placeholder="Nombre completo" autocomplete="off">
        </div>
        <div class="form-group" id="teamGroup">
          <i class="fas fa-building"></i>
          <select id="userTeam">
            <option value="">Selecciona tu equipo/área</option>
            <option value="Ventas">Equipo Ventas</option>
            <option value="Soporte">Equipo Soporte</option>
            <option value="Retencion">Equipo Retención</option>
            <option value="Calidad">Equipo Calidad</option>
            <option value="Operaciones">Operaciones</option>
          </select>
        </div>
        <button id="loginBtn" class="btn-primary btn-block">Ingresar al sistema</button>
        <p class="login-note">💡 Demo: Usa cualquier nombre. Los datos se guardan automáticamente.</p>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
